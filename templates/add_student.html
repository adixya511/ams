<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <style>
        body {
            font-family: "Poppins";
            background: #0b1639;
            color: white;
            display: flex;
            padding-top: 40px;
            justify-content: center;
        }

        .form-box {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            width: 400px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background: #22c55e;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        a {
            text-decoration: none;
            color: #60a5fa;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Add Student</h2>

        <form method="post">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Roll Number</label>
            <input type="text" name="roll_number" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Add Student</button>
        </form>

        <a href="{{ url_for('manage_students') }}">← Back</a>
    </div>

</body>
</html>
