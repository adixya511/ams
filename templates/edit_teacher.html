<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit Teacher</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-light);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      padding: 32px 28px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
    }

    h1 {
      text-align: center;
      margin-bottom: 28px;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: var(--text-light);
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      outline: none;
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: inherit;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    button {
      width: 100%;
      padding: 11px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--success-gradient);
      color: white;
      font-weight: 600;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    button:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .cancel-btn {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .cancel-btn:hover {
      color: var(--primary);
    }

    .form-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>Edit Teacher</h1>

    <form method="post" action="{{ url_for('edit_teacher', id=teacher.id) }}">
      
      <div class="form-group">
        <label>Name</label>
        <input name="name" value="{{ teacher.name }}" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" value="{{ teacher.email }}" required>
      </div>

      <div class="form-group">
        <label>Department</label>
        <input name="department" value="{{ teacher.department or '' }}">
      </div>

      <div class="form-group">
        <label>Subject</label>
        <input name="subject" value="{{ teacher.subject or '' }}">
      </div>

      <div class="form-group">
        <label>New password (leave blank to keep current)</label>
        <input name="password" type="password">
        <div class="form-note">Only fill this field if you want to change the password</div>
      </div>

      <button type="submit">Save Changes</button>
      <a href="{{ url_for('manage_teachers') }}" class="cancel-btn">Cancel</a>

    </form>
  </div>
</body>
</html>
