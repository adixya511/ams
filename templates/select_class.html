<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
    }

    h2 {
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-light);
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    select option {
      background: var(--bg-dark);
      color: var(--text-light);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-submit {
      background: var(--success-gradient);
      color: white;
    }

    .btn-submit:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .btn-back {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    .btn-back:hover {
      background: var(--primary-gradient);
      border-color: var(--primary);
      color: white;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      text-decoration: underline;
      color: var(--primary-light);
    }

    .info-text {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>{{ page_title }}</h2>
    <p class="info-text">
      {% if show_subject is defined and not show_subject %}
        Select the branch and semester to continue
      {% else %}
        Select the branch, semester, and subject to continue
      {% endif %}
    </p>

    <form method="POST">
      <div class="form-group">
        <label for="branch">Branch</label>
        <select id="branch" name="branch" required>
          <option value="">-- Select Branch --</option>
          {% for br in branches %}
            <option value="{{ br }}">{{ br }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="semester">Semester</label>
        <select id="semester" name="semester" required>
          <option value="">-- Select Semester --</option>
          {% for sem in semesters %}
            <option value="{{ sem }}">{{ sem }}</option>
          {% endfor %}
        </select>
      </div>

      {% if show_subject is not defined or show_subject %}
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject" required>
            <option value="">-- Select Subject --</option>
            {% for sub in subjects %}
              <option value="{{ sub }}">{{ sub }}</option>
            {% endfor %}
          </select>
        </div>
      {% endif %}

      <div class="button-group">
        <button type="submit" class="btn-submit">Continue -></button>
        <button type="button" class="btn-back" onclick="history.back()">Cancel</button>
      </div>
    </form>

    <a class="back-link" href="{{ url_for('teacher_dashboard') }}">Back to Dashboard</a>
  </div>
</body>

</html>
