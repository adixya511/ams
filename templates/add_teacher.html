<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Teacher</title>

    <style>
        body {
            font-family: "Poppins";
            background: #0b1639;
            color: white;
            display: flex;
            padding-top: 40px;
            justify-content: center;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            width: 420px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background: #22c55e;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        a {
            text-decoration: none;
            color: #60a5fa;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Add Teacher</h2>

        <form method="post">

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Department</label>
            <input type="text" name="department" required>

            <label>Subject</label>
            <input type="text" name="subject" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Add Teacher</button>
        </form>

        <a href="{{ url_for('manage_teachers') }}">← Back</a>
    </div>

</body>
</html>
