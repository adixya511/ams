<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Student Attendance System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 48px 40px;
      animation: slideUp 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .alert {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #991b1b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 8px;
      font-size: 14px;
    }

    select,
    input {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #ffffff;
      color: var(--text-light);
      transition: all 0.2s ease;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .password-group {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .login-btn:hover {
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-meta {
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .login-meta span {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="login-header">
      <div class="logo-text">📚 Attendance System</div>
      <p class="login-subtitle">Student Management & Tracking</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {% for m in messages %}
            {{ m }}{% if not loop.last %}<br>{% endif %}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="post">
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="">-- Select Role --</option>
          <option value="admin">Admin</option>
          <option value="teacher">Teacher</option>
          <option value="student">Student</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-group">
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-password" id="togglePass">Show</button>
        </div>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <p class="login-meta">Logging in as: <span id="role-display">Admin</span></p>
  </div>

  <script>
    const roleSelect = document.getElementById('role');
    const roleDisplay = document.getElementById('role-display');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePass');

    roleSelect.addEventListener('change', () => {
      roleDisplay.textContent = roleSelect.value.charAt(0).toUpperCase() + roleSelect.value.slice(1);
    });

    toggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? 'Hide' : 'Show';
    });
  </script>

</body>
</html>
