<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <style>
        :root {
            --sidebar-bg: #060b23;
            --main-bg: #0b1639;
            --card-bg: #121d3f;
            --accent-blue: #3b82f6;
            --accent-green: #00e676;
            --text-light: #d1d5ff;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0b1639, #010409);
            color: white;
            display: flex;
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            height: 100vh;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-link {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-light);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .menu-link:hover,
        .active {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .main {
            margin-left: 240px;
            padding: 30px;
            width: calc(100% - 240px);
        }

        .dashboard-title {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 14px;
        }

        .card-title {
            font-size: 14px;
            opacity: 0.7;
        }

        .card-value {
            font-size: 26px;
            margin-top: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">GPK KANGRA</div>

        <a href="{{ url_for('admin_dashboard') }}" class="menu-link active">🏠 Dashboard</a>
        <a href="{{ url_for('manage_students') }}" class="menu-link">👨‍🎓 Manage Students</a>
        <a href="{{ url_for('manage_teachers') }}" class="menu-link">👨‍🏫 Manage Teachers</a>

        <!-- FIXED THIS ↓↓↓ -->
        <a href="{{ url_for('reports') }}" class="menu-link">📊 Reports</a>

        <a href="{{ url_for('logout') }}" class="menu-link">🚪 Logout</a>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="dashboard-title">Admin Dashboard</div>

        <div class="cards">

            <div class="card">
                <div class="card-title">Total Students</div>
                <div class="card-value">{{ students|length }}</div>
            </div>

            <div class="card">
                <div class="card-title">Total Teachers</div>
                <div class="card-value">{{ teachers|length }}</div>
            </div>

            <div class="card">
                <div class="card-title">Total Attendance Records</div>
                <div class="card-value">{{ total_attendance }}</div>
            </div>

        </div>

    </main>

</body>
</html>
