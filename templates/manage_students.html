<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Students</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0b1639, #010409);
            color: white;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            width: 90%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .top-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 22px;
            border-radius: 10px;
            text-decoration: none;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        .table-box {
            background: rgba(255,255,255,0.07);
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        thead {
            background: rgba(255,255,255,0.1);
        }

        th, td {
            padding: 14px;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.04);
        }

        tr:hover {
            background: rgba(255,255,255,0.09);
        }

        .action-btn {
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            color: white;
        }

        .edit-btn {
            background: #3b82f6;
        }

        .edit-btn:hover {
            background: #2563eb;
        }

        .delete-btn {
            background: #ef4444;
        }

        .delete-btn:hover {
            background: #dc2626;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Manage Students</h1>

    <div class="top-buttons">
        <a href="{{ url_for('add_student') }}" class="btn">➕ Add Student</a>
        <a href="{{ url_for('admin_dashboard') }}" class="btn">⬅ Back to Dashboard</a>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Roll</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
            {% for s in students %}
                <tr>
                    <td>{{ s.id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.email }}</td>
                    <td>{{ s.roll_number }}</td>
                    <td>
                        <a href="{{ url_for('edit_student', id=s.id) }}" class="action-btn edit-btn">Edit</a>
                        <a href="{{ url_for('delete_student', id=s.id) }}" class="action-btn delete-btn">Delete</a>
                    </td>
                </tr>
            {% else %}
                <tr>
                    <td colspan="5" style="padding: 20px;">No students found.</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
