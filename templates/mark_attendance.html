<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 750px;
    background: var(--card-bg);
    padding: 32px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--primary-gradient);
  }

  h2 {
    margin-bottom: 24px;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-light);
  }

  h2 span {
    opacity: 0.7;
    font-size: 14px;
    font-weight: 500;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: fixed;
  }

  thead {
    background: var(--bg-darker);
    border-bottom: 3px solid var(--primary);
    border-top: 3px solid var(--primary);
    display: table-header-group;
  }

  th {
    padding: 16px 14px;
    font-weight: 700;
    color: var(--primary);
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    width: 33.33%;
  }

  td {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-light);
    text-align: center;
    width: 33.33%;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tbody tr:hover {
    background: rgba(59, 130, 246, 0.05);
  }

  input[type="radio"] {
    transform: scale(1.3);
    cursor: pointer;
    accent-color: var(--primary);
  }

  .btn-save {
    background: var(--success-gradient);
    color: white;
    padding: 12px 24px;
    width: 100%;
    border: none;
    border-radius: 8px;
    margin-top: 24px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-save:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .back-link {
    display: inline-block;
    margin-top: 20px;
    color: var(--primary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .back-link:hover {
    text-decoration: underline;
    color: var(--primary-light);
  }

  .button-group {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .btn-mark-all {
    background: var(--primary-gradient);
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
    transition: all 0.2s ease;
  }

  .btn-mark-all:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .btn-mark-all[style*="danger"] {
    background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
  }

  @media (max-width: 768px) {
    .container {
      padding: 20px;
    }

    h2 {
      font-size: 18px;
    }

    .button-group {
      flex-direction: column;
    }

    th[style*="width"] {
      font-size: 12px;
    }
  }
</style>

</head>

<body>

<div class="container">

    <h2>Mark Attendance <span style="opacity: .8;">(Subject: {{ teacher.subject }}, Branch: {{ branch }}, Semester: {{ semester }})</span></h2>

    <form method="POST">

        <div class="button-group">
            <button type="button" class="btn-mark-all" onclick="markAllPresent()">✓ Mark All Present</button>
            <button type="button" class="btn-mark-all" style="background: var(--danger);" onclick="markAllAbsent()">✗ Mark All Absent</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width:50%;">Student</th>
                    <th style="width:25%;">Present</th>
                    <th style="width:25%;">Absent</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.name }}</td>

                    <td>
                        <input type="radio" name="{{ s.id }}" value="Present">
                    </td>

                    <td>
                        <input type="radio" name="{{ s.id }}" value="Absent">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button type="submit" class="btn-save">Save Attendance</button>

    </form>

    <a class="back-link" href="{{ url_for('select_class_mark') }}">← Back</a>

</div>

<script>
  function markAllPresent() {
    const radios = document.querySelectorAll('input[type="radio"][value="Present"]');
    radios.forEach(radio => {
      radio.checked = true;
    });
  }

  function markAllAbsent() {
    const radios = document.querySelectorAll('input[type="radio"][value="Absent"]');
    radios.forEach(radio => {
      radio.checked = true;
    });
  }
</script>

</body>
</html>
