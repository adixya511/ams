<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>

<style>
  :root {
    --bg-dark: #0b1639;
    --panel-bg: rgba(255,255,255,0.06);
    --border-color: rgba(255,255,255,0.15);
    --header-bg: rgba(255,255,255,0.12);
    --text-light: #ffffff;
    --primary: #3b82f6;
    --success: #4ade80;
    --danger: #ef4444;
    --font-main: "Poppins", sans-serif;
  }

  body {
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: var(--font-main);
    display: flex;
    justify-content: center;
    padding-top: 60px;
  }

  .container {
    width: 750px;
    background: var(--panel-bg);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    text-align: center;
  }

  h2 {
    margin-bottom: 25px;
    font-size: 24px;
    font-weight: 600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th {
    background: var(--header-bg);
    padding: 14px;
    font-weight: 600;
    border-bottom: 2px solid var(--border-color);
  }

  td {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
  }

  tr:last-child td {
    border-bottom: none;
  }

  input[type="radio"] {
    transform: scale(1.3);
    cursor: pointer;
  }

  .btn-save {
    background: var(--success);
    color: black;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 10px;
    margin-top: 25px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
  }

  .btn-save:hover {
    opacity: 0.9;
  }

  .back-link {
    display: inline-block;
    margin-top: 18px;
    color: var(--primary);
    text-decoration: none;
    font-size: 15px;
  }

  .back-link:hover {
    text-decoration: underline;
  }

  .button-group {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn-mark-all {
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
  }

  .btn-mark-all:hover {
    opacity: 0.9;
  }
</style>

</head>

<body>

<div class="container">

    <h2>Mark Attendance <span style="opacity: .8;">(Subject: {{ teacher.subject }}, Branch: {{ branch }}, Semester: {{ semester }})</span></h2>

    <form method="POST">

        <div class="button-group">
            <button type="button" class="btn-mark-all" onclick="markAllPresent()">✓ Mark All Present</button>
            <button type="button" class="btn-mark-all" style="background: var(--danger);" onclick="markAllAbsent()">✗ Mark All Absent</button>
        </div>

        <table>
            <tr>
                <th style="width:50%;">Student</th>
                <th style="width:25%;">Present</th>
                <th style="width:25%;">Absent</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>

                <td>
                    <input type="radio" name="{{ s.id }}" value="Present">
                </td>

                <td>
                    <input type="radio" name="{{ s.id }}" value="Absent">
                </td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit" class="btn-save">Save Attendance</button>

    </form>

    <a class="back-link" href="{{ url_for('select_class_mark') }}">← Back</a>

</div>

<script>
  function markAllPresent() {
    const radios = document.querySelectorAll('input[type="radio"][value="Present"]');
    radios.forEach(radio => {
      radio.checked = true;
    });
  }

  function markAllAbsent() {
    const radios = document.querySelectorAll('input[type="radio"][value="Absent"]');
    radios.forEach(radio => {
      radio.checked = true;
    });
  }
</script>

</body>
</html>
